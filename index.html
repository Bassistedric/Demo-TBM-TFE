<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>QHSE – Apps</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="qhse-logo.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print{header,footer,.no-print{display:none!important}main{max-width:100%!important}section{page-break-inside:avoid}}
  </style>
</head>

<body class="min-h-screen bg-gray-50">
  <div id="root"></div>

  <script>
    window.QHSE_CONFIG = {
      COLLECT_URL: "https://script.google.com/macros/s/AKfycbwLRqxxGrcsW73R-iMHDbbKFchA2V6Xw5uUZmuo1qVW_DBW8KerO3GD2FRge7xPo-hbjw/exec"
    };

    const DEMO_HOME_URL = "https://bassistedric.github.io/Demo-TBM-TFE/";

    function redirectDemoRoutes() {
      const hash = (window.location.hash || '').toLowerCase();
      if (hash === '#tbm') {
        window.location.replace('./tbm-demo.html');
      }
      if (hash === '#stop') {
        window.location.replace('./stop.html');
      }
    }

    function findTileByText(text) {
      const candidates = Array.from(document.querySelectorAll('a, button, div, section'));
      return candidates.find(el => (el.innerText || '').trim().toLowerCase() === text.toLowerCase())
        || candidates.find(el => (el.innerText || '').toLowerCase().includes(text.toLowerCase()));
    }

    function nearestTile(el) {
      if (!el) return null;
      return el.closest('a, button') || el.closest('article, section, div');
    }

    function patchHomeForDemo() {
      const tbmEl = findTileByText('TBM');
      const tbmTile = nearestTile(tbmEl);
      if (tbmTile) {
        if (tbmTile.tagName === 'A') tbmTile.setAttribute('href', './tbm-demo.html');
        tbmTile.addEventListener('click', function(ev){
          ev.preventDefault();
          window.location.href = './tbm-demo.html';
        }, { once: false });
      }

      ['Reporting', 'Documents'].forEach(label => {
        const el = findTileByText(label);
        const tile = nearestTile(el);
        if (tile) tile.remove();
      });

      document.querySelectorAll('img').forEach(img => {
        const src = img.getAttribute('src') || '';
        const alt = (img.getAttribute('alt') || '').toLowerCase();
        if (src.includes('qrserver') || src.includes('quickchart') || alt.includes('qr')) {
          img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(DEMO_HOME_URL);
        }
      });

      document.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href') || '';
        if (href.includes('bassistedric.github.io/QHSE')) {
          a.setAttribute('href', href.replace('https://bassistedric.github.io/QHSE/', DEMO_HOME_URL));
        }
      });
    }

    window.addEventListener('hashchange', redirectDemoRoutes);
    redirectDemoRoutes();
    window.addEventListener('load', () => {
      patchHomeForDemo();
      const obs = new MutationObserver(() => patchHomeForDemo());
      obs.observe(document.body, { childList: true, subtree: true });
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('./sw.js?v=demo-tfe-2')
          .catch(console.error);
      });
    }
  </script>

  <script type="module" src="https://bassistedric.github.io/QHSE/dist/bundle.js?v=demo-tfe-2"></script>
</body>
</html>
